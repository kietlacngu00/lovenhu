<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh thương 💕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            transition: all 0.3s ease;
            border: 2px solid #ffb6c1;
        }

        h1 {
            color: #d11a5b;
            font-size: 2rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 150px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            white-space: nowrap;
        }

        #btnYes {
            background-color: #ff69b4;
            color: white;
            z-index: 100;
        }

        #btnNo {
            background-color: #a9a9a9;
            color: white;
            position: relative;
            z-index: 99;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .celebration-heart {
            position: absolute;
            font-size: 40px;
            animation: floatUp 2s ease-out forwards;
            z-index: 999;
        }

        @keyframes floatUp {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h1 id="title">Anh thích em, em có iu anh không? 🥰</h1>
        <div class="btn-group" id="btnGroup">
            <button id="btnYes" onclick="handleYes()">Có chứ mạng!</button>
            <button id="btnNo" onclick="handleNo()">Không thèm 🙄</button>
        </div>
    </div>

    <script>
        const FORMSPREE_URL = "https://formspree.io/f/mvzjkjjr"; 

        let stepYes = 1;
        let stepNo = 1;
        
        if (!localStorage.getItem('totalClickNo')) localStorage.setItem('totalClickNo', '0');
        if (!localStorage.getItem('totalClickYes')) localStorage.setItem('totalClickYes', '0');
        
        let todayClickNo = 0;
        let todayClickYes = 0;

        const titleEl = document.getElementById('title');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const btnGroup = document.getElementById('btnGroup');

        let btnNoWidth = 140;
        let btnNoHeight = 50;
        let btnNoFontSize = 1.2;
        let btnNoOpacity = 1;
        
        let intervalNoMove = null;
        let moveSpeed = 2000;
        let yesScale = 1;

        // Hiệu ứng tim rơi nền
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '💗', '💓', '🌸'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 300);

        // Hàm tự động quét và lấy Tên nhà mạng (Viettel, FPT, VNPT...)
        async function layTenNhaMang() {
            try {
                let response = await fetch('https://ipapi.co/json/');
                let data = await response.json();
                // Trả về tên nhà mạng (Ví dụ: "Viettel Corporation" hoặc "FPT Telecom")
                return data.org || "Không rõ nhà mạng";
            } catch (e) {
                return "Lỗi quét nhà mạng";
            }
        }

        // Hàm bắn dữ liệu về Formspree
        async function guiDuLieuSieuToc(luaChon, lanNoHnay, lanYesHnay) {
            if(!FORMSPREE_URL) return;

            const deviceDetail = navigator.userAgent;
            
            // Gọi hàm lấy tên nhà mạng thực tế
            const nhaMangThucTe = await layTenNhaMang();

            let pinMay = "Không hỗ trợ";
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    pinMay = Math.round(battery.level * 100) + "% " + (battery.charging ? "(Sạc)" : "(Thường)");
                } catch (e) { }
            }

            let tongNoLichSu = localStorage.getItem('totalClickNo');
            let tongYesLichSu = localStorage.getItem('totalClickYes');
            let thoiGian = new Date().toLocaleString('vi-VN');

            let formData = new FormData();
            formData.append("Hành động", luaChon);
            formData.append("Thời gian", thoiGian);
            formData.append("Bấm KHÔNG hôm nay", lanNoHnay);
            formData.append("Tổng KHÔNG lịch sử", tongNoLichSu);
            formData.append("Bấm CÓ hôm nay", lanYesHnay);
            formData.append("Tổng CÓ lịch sử", tongYesLichSu);
            formData.append("Pin máy", pinMay);
            formData.append("Tên nhà mạng thực tế", nhaMangThucTe); // Cột mới hiển thị tên nhà mạng
            formData.append("Thiết bị", deviceDetail);

            fetch(FORMSPREE_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).catch(err => console.log(err));
        }

        function handleYes() {
            todayClickYes++;
            let currentTotalYes = parseInt(localStorage.getItem('totalClickYes')) + 1;
            localStorage.setItem('totalClickYes', currentTotalYes);

            clearInterval(intervalNoMove);
            intervalNoMove = null;
            btnNo.style.position = 'relative';
            btnNo.style.left = '0';
            btnNo.style.top = '0';

            if (stepYes === 1) {
                titleEl.innerText = "Em chắc chứ? 🤔";
                btnYes.innerText = "Chắc màaaa";
                btnNo.innerText = "Không chắc...";
                resetNoButton();
                guiDuLieuSieuToc("Bấm nút CÓ lần 1", todayClickNo, todayClickYes);
                stepYes = 2;
            } else if (stepYes === 2) {
                titleEl.innerText = "THẬT LUÔN Á? Đừng gạt anh nha 🥺";
                btnYes.innerText = "Thật lòng luôn!";
                btnNo.innerText = "Gạt xíu thôi";
                guiDuLieuSieuToc("Bấm nút CÓ lần 2", todayClickNo, todayClickYes);
                stepYes = 3;
            } else if (stepYes === 3) {
                titleEl.innerText = "Anh yêu em nhất trên đời!!! 💖✨😘";
                btnYes.style.display = 'none';
                btnNo.style.display = 'none';
                
                guiDuLieuSieuToc("ĐÃ ĐỒNG Ý YÊU 🎉🎉🎉", todayClickNo, todayClickYes);
                startCuteExplosion();
            }
        }

        function handleNo() {
            todayClickNo++;
            let currentTotalNo = parseInt(localStorage.getItem('totalClickNo')) + 1;
            localStorage.setItem('totalClickNo', currentTotalNo);

            if (stepNo === 1) {
                titleEl.innerText = "Không thích thật à... 😢";
                btnYes.innerText = "Thích mà";
                btnNo.innerText = "Không!";
                guiDuLieuSieuToc("Bấm KHÔNG lần 1", todayClickNo, todayClickYes);
                stepNo = 2;
            } else if (stepNo === 2) {
                titleEl.innerText = "Thật chứ? Đừng làm anh buồn... 💔";
                btnYes.innerText = "Thôi được rồi, thích";
                btnNo.innerText = "Vẫn không!";
                guiDuLieuSieuToc("Bấm KHÔNG lần 2", todayClickNo, todayClickYes);
                stepNo = 3;
            } else if (stepNo === 3) {
                titleEl.innerText = "Tại sao lại không thích vậy... 😭";
                btnYes.innerText = "Yêu luôn nè";
                btnNo.innerText = "Cứ không đấy!";
                guiDuLieuSieuToc("Bấm KHÔNG lần 3", todayClickNo, todayClickYes);
                stepNo = 4;
            } else if (stepNo >= 4) {
                titleEl.innerText = "Anh yêu em là đủ rồi! Đố em thoát được! 😜💕😭";
                
                if (!intervalNoMove) {
                    btnNo.style.position = 'absolute';
                    moveNoRandomly();
                    startNoMovement(2000); 
                }

                guiDuLieuSieuToc("Cố chấp bấm KHÔNG khi nút đang chạy", todayClickNo, todayClickYes);
                punishNoButton();
                growYesButton();
            }
        }

        function moveNoRandomly() {
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            const groupRect = btnGroup.getBoundingClientRect();
            
            btnNo.style.left = (randomX - groupRect.left) + 'px';
            btnNo.style.top = (randomY - groupRect.top) + 'px';
        }

        function startNoMovement(speed) {
            clearInterval(intervalNoMove);
            moveSpeed = speed;
            intervalNoMove = setInterval(moveNoRandomly, moveSpeed);
        }

        function punishNoButton() {
            btnNoWidth *= 0.8;
            btnNoHeight *= 0.8;
            btnNoFontSize *= 0.8;
            btnNoOpacity *= 0.75;

            btnNo.style.width = btnNoWidth + 'px';
            btnNo.style.height = btnNoHeight + 'px';
            btnNo.style.fontSize = btnNoFontSize + 'rem';
            btnNo.style.opacity = btnNoOpacity;

            let newSpeed = Math.max(500, moveSpeed - 500);
            startNoMovement(newSpeed);

            if (btnNoOpacity < 0.15 || btnNoWidth < 20) {
                btnNo.style.display = 'none';
            }
        }

        function growYesButton() {
            yesScale += 1.5;
            btnYes.style.transform = `scale(${yesScale})`;
            if (yesScale > 12) {
                handleYes();
            }
        }

        function resetNoButton() {
            btnNoWidth = 140;
            btnNoHeight = 50;
            btnNoFontSize = 1.2;
            btnNoOpacity = 1;
            btnNo.style.width = 'auto';
            btnNo.style.height = 'auto';
            btnNo.style.fontSize = '1.2rem';
            btnNo.style.opacity = '1';
            stepNo = 1;
        }

        function startCuteExplosion() {
            document.body.style.backgroundColor = "#ffc0cb";
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('celebration-heart');
                    heart.innerHTML = ['❤️', '💖', '💝', '😻', '😘', '✨', '🎈', '🌸'][Math.floor(Math.random() * 8)];
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 400 + 150;
                    const tx = Math.cos(angle) * distance + 'px';
                    const ty = Math.sin(angle) * distance + 'px';
                    
                    heart.style.setProperty('--tx', tx);
                    heart.style.setProperty('--ty', ty);
                    
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
